- name: Gather more detailed info about hosts
  hosts: all
  tasks:
    - name: Gather more detailed info with builtin.setup
      ansible.builtin.setup:
        gather_subset: all
        gather_timeout: 10
        fact_path: /srv/ansible/facts.d

    - name: Dump specific facts of interest
      ansible.builtin.debug:
        msg:
          - "Distribution: {{ ansible_facts.distribution }} {{ ansible_facts.lsb.codename }} ({{ ansible_facts.lsb.major_release }})"
          - "Kernel: {{ ansible_facts.kernel }}"
          - "Network"
          - " Local IPv4: {{ ansible_facts.default_ipv4.address }}/{{ ansible_facts.default_ipv4.prefix }}"
          - " DNS Nameservers: {{ ansible_facts.dns.nameservers }}"

    - name: Check DNS configuration
      ansible.builtin.assert:
        that:
          - "'1.1.1.1' in ansible_facts.dns.nameservers"
        fail_msg: "DNS may be misconfigured!"
        success_msg: "DNS configured properly!"


    - name: DEBUG:Dump all facts gathered
      ansible.builtin.debug:
        var: ansible_facts
        verbosity: 4

- name: Group targets based on facts
  hosts: all
  gather_facts: false # Don't re-gather facts if we already have them
  tasks:
    - name: Group based on OS distribution
      ansible.builtin.group_by:
        key: os_{{ ansible_facts.distribution | lower }}

    - name: Group targets by architecture
      ansible.builtin.group_by:
        key: arc_{{ ansible_facts.architecture }}

- name: Import 002-updates playbook
  ansible.builtin.import_playbook: 002-updates.yaml
