# Main playbook for enabling unattended upgrades and auto-upgrades
# Right now, this script only supports systems using the apt(1) package manager
# Support for other distros using dnf(1) will be added later on
---
- name: Install python-apt for package facts
  ansible.builtin.apt:
    pkg:
      - python3-apt
  notify: "Update apt cache"

- name: Gather package facts
  ansible.builtin.package_facts:
    manager: apt

- name: Verify unattended-upgrades and apt-listchanges are installed (if not already)
  ansible.builtin.apt:
    pkg:
      - unattended-upgrades
      - apt-listchanges
  when: "'unattended-upgrades' not in ansible_facts.packages or 'apt-listchanges' not in ansible_facts.packages"

- name: Enable unattended upgrades and periodic cache updates
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
    owner: root
    group: root
    mode: "0644"
  register: updates_20autoupgrades

- name: Enable automatic reboot in 50unattended-upgrades
  ansible.builtin.lineinfile:
    path: /etc/apt/apt.conf.d/50unattended-upgrades
    search_string: '//Unattended-Upgrade::Automatic-Reboot "false";'
    line: 'Unattended-Upgrade::Automatic-Reboot "true";'

- name: Check apt-daily-upgrade.timer
  ansible.builtin.systemd_service:
    state: started
    name: apt-daily-upgrade.timer
  register: updates_aptdailytimer
  check_mode: true
  failed_when: updates_aptdailytimer.changed
