- name: Group targets based on facts
  hosts: all
  tasks:
    - name: Group based on tier
      ansible.builtin.group_by:
        key: "tier_{{ inventory_dir.split('/')[-2:] | join('/') }}"

    - name: Group based on OS distribution
      ansible.builtin.group_by:
        key: os_{{ ansible_facts.distribution | lower }}

    - name: Group targets by architecture
      ansible.builtin.group_by:
        key: arc_{{ ansible_facts.architecture }}

# Debian-based distros
- name: Import 002-updates playbook
  ansible.builtin.import_playbook: 002-updates.yaml
