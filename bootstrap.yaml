# Bootstrap script, meant for new guests that come online
# Right now, this is focused on UNIX-based systems
# Windows will eventually get support

- name: Perform preflight checks
  import_playbook: preflight.yml

- name: Group targets based on facts
  hosts: all
  tasks:
    - name: Group based on OS distribution
      ansible.builtin.group_by:
        key: os_{{ ansible_facts.distribution | lower }}

    - name: Group targets by architecture
      ansible.builtin.group_by:
        key: arc_{{ ansible_facts.architecture }}

    - name: Warn if windows targets are found
      ansible.builtin.debug:
        msg:
          - "{{ inventory_hostname }} is a windows host!"
          - "Windows hosts are not currently supported."
          - "Ignoring this host..."
      when: "'windows' in ansible_facts.distribution"

- name: Import updates role
  hosts: os_debian
